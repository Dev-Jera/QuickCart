services:
  backend:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      POSTGRES_DB: quickcart
      POSTGRES_USER: quickcart_user
      POSTGRES_PASSWORD: quickcart123
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,backend
      DJANGO_SECRET_KEY: quickcart-docker-secret
      DJANGO_DEBUG: "True"
    depends_on:
      - db
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      REACT_APP_API_URL: http://localhost:8000/api
      WDS_SOCKET_PORT: 3000
    depends_on:
      - backend
    command: sh -c "npm install && npm start"

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: quickcart
      POSTGRES_USER: quickcart_user
      POSTGRES_PASSWORD: quickcart123
    ports:
      - "5432:5432"
